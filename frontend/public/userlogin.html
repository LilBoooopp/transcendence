<!DOCTYPE html>
<html>
<head>
  <title>auth</title>
</head>
<body>
  <h2>login</h2>
  <form id="loginForm">
    <input id="loginUsername" placeholder="Username" /><br/>
    <input id="loginPassword" type="password" placeholder="Password" /><br/>
    <button type="submit">Login</button>
	<button type="button" id="logoutBtn">Logout</button>
	</form>
	<a href="./userregister.html">Register</a>
	<a href="./userpage.html">User Page</a>

	<h2>showusers</h2>
	<button type="button" id="enterGameBtn">Enter Game</button>
	<button type="button" id="showUsersBtn">Show Users</button>
	<button type="button" id="IsConnected">Is Connected?</button>
  <p id="result"></p>
  <script>
	//LOGIN 
	document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
	  console.log("enter login");
	  //route pour login...
	  //REST POST '/api/auth/login'
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('loginUsername').value,
          password: document.getElementById('loginPassword').value,
        })
      });
	  ///verifier si c est bien du json
      const data = await res.json().catch(() => ({ message: 'Erreur serveur'}));
	  if (res.ok) {
    // Changez access_token en accessToken
    localStorage.setItem('authToken', data.accessToken);
    result.textContent = `Connecté : ${data.username || 'OK'}`;
  } else {
    result.textContent = `Erreur : ${data.message || res.status}`;
  }
});
	//LOGOUT
	document.getElementById('logoutBtn').addEventListener('click', logout);
	async function logout(e){
		e.preventDefault();
		const token = localStorage.getItem('authToken');

		if (!token){
			document.getElementById('result').textContent = 'No token';
			return
		}
	const res = await fetch('/api/auth/logout', {
        method: 'POST',
        headers: {
			'Content-Type': 'application/json',
			'Authorization': `Bearer ${token}`
			}
        })
		console.log('In logout1');
	if (res.ok) {
		  // Supprimer le token du localStorage
		localStorage.removeItem('authToken');
		document.getElementById('result').textContent = 'Vous avez été déconnecté';
	}
	else {
		document.getElementById('result').textContent = 'Erreur: logout echoue';
	}
    
  // Effacer le message de connexion
  // Optionnel: rediriger vers la page de login après 1 seconde
 // setTimeout(() => {
 //   window.location.href = '/'; // ou la page de login
 // }, 1000);
};


	//ENTER GAME
	document.getElementById('enterGameBtn').addEventListener('click', async (e) => {
	e.preventDefault();
	console.log("you want to enter the game start");
	// Vérifier si l'utilisateur est connecté (token existe)
	const token = localStorage.getItem('authToken');
  
  if (!token) {
    document.getElementById('result').textContent = 'Erreur: Vous devez être connecté pour accéder au jeu';
    return;
  }
  console.log("you want to enter the game");
  // Rediriger vers la page jeu
  window.location.href = '/game';
});
	//SHOW USERS
    document.getElementById('showUsersBtn').addEventListener('click', async (e) => {
		console.log("clicked");
      e.preventDefault();
	 const token = localStorage.getItem('authToken');
	if (!token) {
    document.getElementById('result').textContent = 'Error: you have to be connected to see the players';
    return;
	}
      const res = await fetch('/api/users', {
        method: 'GET',
        headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      });
    const users = await res.json();
	if (res.ok) {
    const userList = users.map(u => `${u.username} (${u.email})`).join('<br/>');
    document.getElementById('result').innerHTML = `<h3>Users:</h3>${userList}`;
  } else {
    document.getElementById('result').textContent = 'Erreur: ' + users.message;
  }
    });
	////ISCONNECTED?
	document.getElementById('IsConnected').addEventListener('click', async (e) => {
	console.log('is connected clicked');
	e.preventDefault();
	const token = localStorage.getItem('authToken');
	if (!token){
		document.getElementById('result').textContent = 'Not connected. No Token';
		return;
	}
	const res = await fetch('/api/users/isConnected', {
		method: 'GET',
		headers: {
			'Content-Type': 'application/json',
			'Authorization': `Bearer ${token}`
		}
	});
	const data = await res.json().catch(() => ({ message: 'Erreur serveur'}));
	if (res.ok && data.isConnected){
		document.getElementById('result').textContent = `You are connected as : ${data.username}`;
	}
	else {
		document.getElementById('result').textContent = 'You have a token but are not connected';
	}
	});

  </script>
</body>
</html>
