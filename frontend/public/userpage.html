<!DOCTYPE html>
<html>
<head>
  <title>user page</title>
</head>
<body>
  <h2>information</h2>
  <button type="button" id="IsConnected">Is Connected?</button>
  <button type="button" id="logoutBtn">Logout</button>
	


	<h2>showusers</h2>
	
  <p id="result"></p>
  <script>
		//LOGOUT
	document.getElementById('logoutBtn').addEventListener('click', logout);
	async function logout(e){
		e.preventDefault();
		const token = localStorage.getItem('authToken');

		if (!token){
			document.getElementById('result').textContent = 'No token';
			return
		}
	const res = await fetch('/api/auth/logout', {
        method: 'POST',
        headers: {
			'Content-Type': 'application/json',
			'Authorization': `Bearer ${token}`
			}
        })
		console.log('In logout1');
	if (res.ok) {
		  // Supprimer le token du localStorage
		localStorage.removeItem('authToken');
		document.getElementById('result').textContent = 'Vous avez été déconnecté';
	}
	else {
		document.getElementById('result').textContent = 'Erreur: logout echoue';
	}




    
  // Effacer le message de connexion
  // Optionnel: rediriger vers la page de login après 1 seconde
 // setTimeout(() => {
 //   window.location.href = '/'; // ou la page de login
 // }, 1000);
};

	////ISCONNECTED?
	document.getElementById('IsConnected').addEventListener('click', async (e) => {
	console.log('is connected clicked');
	e.preventDefault();
	const token = localStorage.getItem('authToken');
	if (!token){
		document.getElementById('result').textContent = 'Not connected. No Token';
		return;
	}
	const res = await fetch('/api/users/isConnected', {
		method: 'GET',
		headers: {
			'Content-Type': 'application/json',
			'Authorization': `Bearer ${token}`
		}
	});
	const data = await res.json().catch(() => ({ message: 'Erreur serveur'}));
	if (res.ok && data.isConnected){
		document.getElementById('result').textContent = `Hey ${data.username}`;
	}
	else {
		document.getElementById('result').textContent = 'You have a token but are not connected';
	}
	});

  </script>
