<!DOCTYPE html>
<html>
<head>
  <title>auth</title>
</head>
<body>
  <h2>login</h2>
  <form id="loginForm">
    <input id="loginUsername" placeholder="Username" /><br/>
    <input id="loginPassword" type="password" placeholder="Password" /><br/>
    <button type="submit">Login</button>
	</form>
	<a href="./register.html">Register</a>
  <p id="result"></p>
  <script>
	//LOGIN 
	const result = document.getElementById('result');

	document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
	  console.log("enter login");
	  //route pour login...
	  //REST POST '/api/auth/login'
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          username: document.getElementById('loginUsername').value,
          password: document.getElementById('loginPassword').value,
        })
      });
	  ///verifier si c est bien du json
      const data = await res.json().catch(() => ({ message: 'Erreur serveur'}));
	  if (res.ok) {
    // Changez access_token en accessToken
    localStorage.setItem('authToken', data.accessToken);
	document.getElementById('loginForm').reset();
	window.opener.location.href = '/basepage.html';
	window.close();
  } else {
	//ameliorer les raisons
    result.textContent = `Erreur : ${data.message || res.status}`;
  }
});
  </script>
</body>
</html>
