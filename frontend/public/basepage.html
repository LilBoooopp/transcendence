<!DOCTYPE html>
<html>
<head>
  <title>base page with protected roads</title>
</head>
<body>
  <h2>base page with protected roads  the good one :)</h2>
  <button type="button" id="enterGameBtn">Enter Game</button><br>

  <br><br><br>
  <button id="loginBtn">Login</button>
  <button type="button" id="logoutBtn">Logout</button><br>
  <button id="registerBtn">Register</button><br>
  <button id="UserPage">User Page</button>
  	<h2>showusers</h2>
  <button type="button" id="showUsersBtn">Show Users</button>
  <p id="result"></p>

  <script>
	const result = document.getElementById('result');
	//FUNCTION TO SEE IF THE USER IS CONNECTED
	async function isUserConnected(){
		const token = localStorage.getItem('authToken');
		if (!token){
			console.log('no token');
			return false;
		} 
	try {
		const res = await fetch('/api/auth/me', {
			method: 'GET',
			headers: {
				'Content-Type': 'application/json',
				'Authorization': `Bearer ${token}`
			}
		});
		if (!res.ok)
		{
			localStorage.removeItem('authToken');
			return false;
		}
		const data = await res.json();
		//!! retourne value en vrai booleen. 
		return !!data.isConnected;
	} catch (error){
		return false;
	}
	}
	// WINDOWS POPUP
	function openPopup(page, name) {
		window.open(page, name, 'width=300,height=300');
	}
	// POP UP WINDOW FOR LOGIN
	document.getElementById('loginBtn').addEventListener('click', async () => {
		if (await isUserConnected()){
			result.textContent = 'You are already connected';
			return;
		}
		openPopup('/login.html', 'Login');
	});
	// POP UP WINDOW FOR REGISTER
	document.getElementById('registerBtn').addEventListener('click', async () => {
		if (await isUserConnected()){
			result.textContent = 'You are already connected';
			return;
		}
		openPopup('/register.html', 'Register');
	})
	//LOGOUT
	document.getElementById('logoutBtn').addEventListener('click', logout);
	async function logout(e){
		e.preventDefault();
		if (!await isUserConnected()){
			result.textContent = 'You are not connected';
			return;
		}
		console.log('In logout1');
		try{
			const token = localStorage.getItem('authToken');
			const res = await fetch('/api/auth/logout', {
				method: 'POST',
				headers: {
					'Content-Type': 'application/json',
					'Authorization': `Bearer ${token}`
				}
        })
		if (res.ok) {
		  // Supprimer le token du localStorage
			localStorage.removeItem('authToken');
			result.textContent = 'Vous avez été déconnecté';
		}
		else {
		result.textContent = 'Erreur: logout echoue';
		}
	}
	catch(error) {
		result.textContent = 'Erreur réseau pendant le logout';
	}
};


	//ENTER USER DETAIL PAGE
	document.getElementById('UserPage').addEventListener('click', async (e) => {
	e.preventDefault();
	console.log("you want to enter the user page");
	//demande au backend de vérifier si le user est bien connecté
	if (!await isUserConnected()){
			//result.textContent = 'You are not connected';
			openPopup('/login.html', 'Login');
			return;
		}
  console.log("you are entering the user page");
  // Rediriger vers la page jeu
  window.location.href = './user.html';
});

	//ENTER GAME BIEN :)
	document.getElementById('enterGameBtn').addEventListener('click', async (e) => {
	e.preventDefault();
	console.log("you want to enter the game start");
	//demande au backend de vérifier si le user est bien connecté
	if (!await isUserConnected()){
			//result.textContent = 'You are not connected';
			openPopup('/login.html', 'Login');
			return;
		}
  console.log("you want to enter the game");
  // Rediriger vers la page jeu
  window.location.href = './games.html';
});

	//SHOW USERS BIEN :)
    document.getElementById('showUsersBtn').addEventListener('click',showUsers);

	async function showUsers(e){
		e.preventDefault();
		if (!await isUserConnected())
		{
			result.textContent = 'Error: you have to be connected to see the players';
			return;
		}
		const token = localStorage.getItem('authToken');
		try {
			const res = await fetch('/api/users', {
			method: 'GET',
			headers: {
			'Content-Type': 'application/json',
			'Authorization': `Bearer ${token}`
			}
      	});
		const users = await res.json();
		if (res.ok) {
			const userList = users.map(u => `${u.username} (${u.email})`).join('<br/>');
			result.innerHTML = `<h3>Users:</h3>${userList}`;
		}
		else {
			result.textContent = 'Erreur: ' + users.message;
		}
	}
		catch (error){
			result.textContent = 'Erreur réseau pendant show users';
		}
	}

	//SHOW AUTOMATICALLY IF CONNECTED AND NAME :)
	async function showConnectionStatus() {
try {
	if (!await isUserConnected())
		{
			result.textContent = 'You are  not connected yet';
			return;
		}
		const token = localStorage.getItem('authToken');
		const res = await fetch('/api/auth/me', {
		method: 'GET',
		headers: {
			'Content-Type': 'application/json',
			'Authorization': `Bearer ${token}`
			}
		})
		//c'est quoi ça??
		const data = await res.json().catch(() => ({ message: 'Erreur serveur'}));
		if (res.ok && data.isConnected){
			result.textContent = `Hey ${data.username}`;
		}
		else {
			result.textContent = 'You are  not connected';
		}
	}
	catch (error) {
		result.textContent = 'Error on get Element by ID';
	}
}
	document.addEventListener('DOMContentLoaded', showConnectionStatus);
  </script>
